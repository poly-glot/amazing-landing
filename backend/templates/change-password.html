{{define "change-password.html"}}{{template "layout.html" .}}{{end}}
{{define "content"}}

<nav class="c-breadcrumb" aria-label="Breadcrumb">
  <a class="c-breadcrumb__link" href="/admin">Home</a>
  <img class="c-breadcrumb__sep c-icon" src="/assets/icons/chevron-right.svg" alt="" aria-hidden="true">
  <span class="c-breadcrumb__current">Change Password</span>
</nav>

<div class="c-page-header">
  <div>
    <h1 class="c-page-title">Change Password</h1>
    <p class="c-page-subtitle">Update your account password. Choose a strong password with at least 12 characters.</p>
  </div>
</div>

<div class="c-panel">
  <div class="c-panel__body">
    <form method="POST" action="/change-password" class="c-form">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

      {{if not .ForcedChange}}
      <div class="c-form__field">
        <label for="current_password" class="c-form__label">Current Password</label>
        <input type="password" id="current_password" name="current_password" required class="c-form__input">
      </div>
      {{end}}

      <div class="c-form__field">
        <label for="new_password" class="c-form__label">New Password</label>
        <input type="password" id="new_password" name="new_password" required minlength="12" class="c-form__input">
      </div>

      <div class="c-form__field">
        <label for="confirm_password" class="c-form__label">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="12" class="c-form__input">
      </div>

      <div class="c-form__actions">
        <button type="submit" class="c-button c-button--primary">Update Password</button>
        <a href="/admin" class="c-button c-button--secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
