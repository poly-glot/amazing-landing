{{define "login.html"}}{{template "layout.html" .}}{{end}}
{{define "content"}}
<div class="c-login-card">
  <span class="c-login-card__logo">Azadi</span>
  <p class="c-login-card__sub">Admin Portal</p>

  <form id="login-form" method="POST" action="/login" class="c-form" style="max-inline-size:none">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

    <div class="c-form__field">
      <label for="email" class="c-form__label">Email</label>
      <input type="email" id="email" name="email" required autofocus class="c-form__input" placeholder="admin@azadi.com">
    </div>

    <div class="c-form__field">
      <label for="password" class="c-form__label">Password</label>
      <input type="password" id="password" name="password" required class="c-form__input" placeholder="Enter your password">
    </div>
  </form>

  {{if .DemoMode}}
  <form id="demo-form" method="POST" action="/login">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <input type="hidden" name="email" value="admin@azadi.com">
    <input type="hidden" name="password" value="changeme123">
  </form>
  {{end}}

  <div class="c-form__actions" style="align-items:center;justify-content:space-between;flex-wrap:nowrap;margin-block-start:var(--sp-6)">
    <button type="submit" form="login-form" class="c-button c-button--primary" style="flex:1;min-inline-size:unset">Sign In</button>
    {{if .DemoMode}}
    <button type="submit" form="demo-form" class="c-button c-button--link">Login as Admin</button>
    {{end}}
  </div>
</div>
{{end}}
