{{define "admin/store-form.html"}}{{template "layout.html" .}}{{end}}
{{define "content"}}

<nav class="c-breadcrumb" aria-label="Breadcrumb">
  <a class="c-breadcrumb__link" href="/admin">Home</a>
  <img class="c-breadcrumb__sep c-icon" src="/assets/icons/chevron-right.svg" alt="" aria-hidden="true">
  <a class="c-breadcrumb__link" href="/admin/stores">Stores</a>
  <img class="c-breadcrumb__sep c-icon" src="/assets/icons/chevron-right.svg" alt="" aria-hidden="true">
  <span class="c-breadcrumb__current">{{if .Store.ID}}Edit Store{{else}}New Store{{end}}</span>
</nav>

<div class="c-page-header">
  <h1 class="c-page-title">{{if .Store.ID}}Edit Store{{else}}New Store{{end}}</h1>
</div>

<div class="c-panel">
  <div class="c-panel__body">
    <form method="POST" action="{{if .Store.ID}}/admin/stores/{{.Store.ID}}{{else}}/admin/stores{{end}}" class="c-form">
      <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

      <div class="c-form__field">
        <label for="town" class="c-form__label">Town</label>
        <input type="text" id="town" name="town" required value="{{.Store.Town}}" class="c-form__input" placeholder="e.g. Aix-en-Provence">
      </div>

      <div class="c-form__field">
        <label for="address" class="c-form__label">Address</label>
        <input type="text" id="address" name="address" required value="{{.Store.Address}}" class="c-form__input" placeholder="Full street address">
      </div>

      <div class="c-form__row">
        <div class="c-form__field">
          <label for="lat" class="c-form__label">Latitude</label>
          <input type="text" id="lat" name="lat" value="{{.Store.Lat}}" class="c-form__input" placeholder="43.5297">
        </div>
        <div class="c-form__field">
          <label for="lng" class="c-form__label">Longitude</label>
          <input type="text" id="lng" name="lng" value="{{.Store.Lng}}" class="c-form__input" placeholder="5.4474">
        </div>
      </div>

      <div class="c-form__field">
        <label for="image" class="c-form__label">Image URL</label>
        <input type="text" id="image" name="image" value="{{.Store.Image}}" class="c-form__input" placeholder="https://example.com/store-photo.jpg">
      </div>

      <div class="c-form__field">
        <label for="map_link" class="c-form__label">Map Link</label>
        <input type="url" id="map_link" name="map_link" value="{{.Store.MapLink}}" class="c-form__input" placeholder="https://maps.google.com/...">
      </div>

      <div class="c-form__row">
        <div class="c-form__field">
          <label for="sort_order" class="c-form__label">Sort Order</label>
          <input type="number" id="sort_order" name="sort_order" value="{{.Store.SortOrder}}" class="c-form__input" placeholder="0">
        </div>
        <div class="c-form__field">
          <label class="c-option">
            <input type="checkbox" name="is_active" value="true" {{if .Store.IsActive}}checked{{end}} class="c-option__input">
            <span class="c-option__label">Active</span>
          </label>
        </div>
      </div>

      <div class="c-form__actions">
        <button type="submit" class="c-button c-button--primary">{{if .Store.ID}}Update Store{{else}}Create Store{{end}}</button>
        <a href="/admin/stores" class="c-button c-button--secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
